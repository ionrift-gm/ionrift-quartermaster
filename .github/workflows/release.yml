name: Release Creation

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Validate Assets
        run: |
          FIRST_PNG=$(find assets -name '*.png' -type f | head -1)
          if [ -z "$FIRST_PNG" ]; then
            echo "WARNING: No PNG files found in assets/ � skipping validation"
          else
            SIZE=$(wc -c < "$FIRST_PNG")
            if [ "$SIZE" -lt 1000 ]; then
              echo "ERROR: $FIRST_PNG is only ${SIZE} bytes � likely an LFS pointer, not an image"
              exit 1
            fi
            echo "OK: Asset files are real images (first file: $FIRST_PNG, ${SIZE} bytes)"
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Compile compendium packs
        run: node tools/compile-packs.mjs

      - name: Validate compiled packs
        run: node tools/validate-packs-local.mjs

      - name: Validate shipping manifest
        run: node tools/validate-shipping.mjs

      - name: Build shipping manifest
        run: node tools/filter-manifest.mjs

      - name: Stage filtered manifest for release
        run: cp .build/module.json module.json

      - name: Zip Module
        run: |
          zip -r module.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".gitignore" \
            -x ".gitattributes" \
            -x ".cursor/*" \
            -x "tests/*" \
            -x "node_modules/*" \
            -x "packs/src/*" \
            -x "packs/.validation-staging/*" \
            -x "packs/SHIPPING.json" \
            -x ".build/*" \
            -x "*.mjs" \
            -x "*.bak" \
            -x "*.lock" \
            -x "*.ps1" \
            -x "package.json" \
            -x "package-lock.json" \
            -x "BACKLOG.md" \
            -x "task.md" \
            -x "tools/*" \
            -x "docs/*" \
            -x "vitest*" \
            -x ".eslintrc*"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            module.zip
            module.json
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-ea') || contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
          make_latest: ${{ !(contains(github.ref_name, '-ea') || contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha')) }}

      - name: Notify Foundry VTT
        if: success() && !contains(github.ref_name, '-ea') && !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-beta') && !contains(github.ref_name, '-alpha')
        uses: actions/github-script@v7
        env:
          FOUNDRY_TOKEN: ${{ secrets.FOUNDRY_PACKAGE_RELEASE_TOKEN }}
        with:
          script: |
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('module.json', 'utf8'));
            const payload = {
              id: manifest.id,
              release: {
                version: manifest.version,
                manifest: `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/latest/download/module.json`,
                notes: `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/tag/v${manifest.version}`,
                compatibility: manifest.compatibility
              }
            };
            console.log("Sending payload:", JSON.stringify(payload, null, 2));
            const response = await fetch("https://foundryvtt.com/_api/packages/release_version/", {
              method: "POST",
              headers: { 'Content-Type': 'application/json', 'Authorization': process.env.FOUNDRY_TOKEN },
              body: JSON.stringify(payload)
            });
            const text = await response.text();
            let data;
            try { data = JSON.parse(text); } catch { data = text; }
            console.log("Response:", typeof data === 'string' ? data : JSON.stringify(data, null, 2));
            if (!response.ok) {
              core.setFailed(`Foundry API Error (${response.status}): ${typeof data === 'string' ? data : JSON.stringify(data)}`);
            } else {
              console.log("Foundry VTT notified successfully.");
            }

      # Discord notification: manual for EA. Automated Discord for v1.3.0 full release
      # can be added here following the Respite notify-discord job pattern.
